<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="styles.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>José Vázquez | UX Designer</title>

<style>
.home-hero{
padding:100px 20px;
background:#F4F1E9;
}

.hero-content{
max-width:1100px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
gap:40px;
}

.hero-text{
max-width:500px;
}

.hero-visual img{
max-width:500px;
width:100%;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px 20px;
max-width:1100px;
margin:auto;
}

.project-card{
background:#fff;
border-radius:12px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.project-card img{
width:100%;
border-radius:8px;
}

.project-card h3{
margin-top:15px;
}

.project-card a{
display:inline-block;
margin-top:10px;
color:#0077DD;
}

@media(max-width:768px){
.hero-content{
flex-direction:column;
text-align:center;
}
}
</style>

</head>

<body>

<section class="home-hero">

  <div class="hero-content">

    <div class="hero-text">
      <h1>José Vázquez — UX Designer</h1>
      <p>Diseño experiencias digitales que reducen fricción y mejoran la toma de decisiones.</p>
      <a href="#proyectos" class="btn">Ver proyectos</a>
    </div>

    <div class="hero-visual">
      <img src="Low.png" alt="Wireframe vs UI final">
    </div>

  </div>

</section>

  <section class="projects">

  <div class="project-card">
    <img src="campack-app.jpg" alt="">
    <h3>CamPack App</h3>
    <p>Optimización de búsqueda y decisión en eCommerce</p>
    <a href="appcampack.html">Ver caso</a>
  </div>

  <div class="project-card">
    <img src="campack-web.jpg" alt="">
    <h3>CamPack Sitio Responsivo</h3>
    <p>Estructura y navegación adaptada a distintos dispositivos</p>
    <a href="webcampack.html">Ver caso</a>
  </div>

</section>

</body>
</html>
